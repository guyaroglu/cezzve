name: FalYolu CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18.x'
  JAVA_VERSION: '11'

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend linting
        run: |
          cd backend
          npm run lint

      - name: Run backend tests
        run: |
          cd backend
          npm test
        env:
          NODE_ENV: test
      - name: Validate OpenAPI schema
        run: |
          npm i -g swagger-cli
          swagger-cli validate backend/openapi.yaml
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}

      - name: Upload backend coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage/lcov.info
          flags: backend

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      - name: Upload frontend coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend

  # E2E Tests
  e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java for Android
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Android app for testing
        run: |
          cd frontend
          npm run detox:build

      - name: Run E2E tests
        run: |
          cd frontend
          npm run detox:test

  # Build and Deploy
  build-deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Backend Build and Deploy
      - name: Build backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Deploy to Firebase Functions
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          channelId: live
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      # Android Build
      - name: Setup Java for Android
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Android Release
        run: |
          cd frontend
          npm ci
          npm run build:android

      - name: Upload Android Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-release
          path: frontend/android/app/build/outputs/apk/release/

      # iOS Build (macOS runner needed)
      - name: Build iOS Release
        if: runner.os == 'macOS'
        run: |
          cd frontend
          npm ci
          npm run pods
          npm run build:ios

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Performance Test
  performance-test:
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /dev/null >> /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run performance baseline (load-test)
        run: |
          cd backend
          k6 run -e BASE_URL=${{ env.PERF_BASE_URL || 'http://localhost:3000' }} tests/performance/load-test.js

      - name: Run performance scenarios
        run: |
          cd backend
          k6 run -e BASE_URL=${{ env.PERF_BASE_URL || 'http://localhost:3000' }} tests/performance/scenarios.js --vus 20 --duration 60s --summary-export k6-summary.json

      - name: PR comment (k6)
        if: github.event_name == 'pull_request'
        run: |
          node -e "const fs=require('fs');const p='backend/k6-summary.json';if(fs.existsSync(p)){const j=JSON.parse(fs.readFileSync(p,'utf8'));const s=j.metrics;const p95=s.http_req_duration['p(95)'];const p99=s.http_req_duration['p(99)'];const err=s.http_req_failed.rate;console.log(`k6 summary: p95=${p95}ms p99=${p99}ms error_rate=${(err*100).toFixed(2)}%`);}"

  # PR smoke performance test
  performance-smoke:
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /dev/null >> /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run performance smoke (short - load-test)
        run: |
          cd backend
          K6_DURATION=30s K6_VUS=20 node -e "
            const fs=require('fs');
            let c=fs.readFileSync('tests/performance/load-test.js','utf8');
            c=c.replace(/stages:[\s\S]*?],/,'stages: [ { duration: \"30s\", target: 20 } ],');
            fs.writeFileSync('tests/performance/load-test.smoke.js', c);
          "
          k6 run -e BASE_URL=${{ env.PERF_BASE_URL || 'http://localhost:3000' }} tests/performance/load-test.smoke.js

      - name: Run performance smoke (short - scenarios)
        run: |
          cd backend
          k6 run -e BASE_URL=${{ env.PERF_BASE_URL || 'http://localhost:3000' }} tests/performance/scenarios.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: k6-smoke-results
          path: backend/tests/performance/

  # Notification
  notify:
    runs-on: ubuntu-latest
    needs: [build-deploy]
    if: always()

    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}